name: Build and Push Docker Image

# 触发条件：每次推送到 main 分支时运行
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # 使用 Ubuntu 环境

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Docker Buildx（支持多平台构建，可选）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录 Docker Hub（或其他镜像仓库）
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # 你的 Docker Hub 用户名
          password: ${{ secrets.DOCKER_PASSWORD }} # 你的 Docker Hub 访问令牌

      # 4. 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # 使用当前目录
          push: true # 推送镜像到仓库
          tags: ${{ secrets.DOCKER_USERNAME }}/my-project:latest # 镜像名，例如 username/my-project:latest
